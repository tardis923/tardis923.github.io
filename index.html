<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>工具箱</title>

<style>
    :root {
        --bg: #f5f5f7;
        --text-main: #1d1d1f;
        --text-sub: #86868b;
        --card-bg: #ffffff;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont,
                     "SF Pro Display", "Helvetica Neue",
                     Helvetica, Arial;
        background: var(--bg);
        color: var(--text-main);
        scroll-behavior: smooth;
    }

    .hero {
        text-align: center;
        padding: 120px 20px 100px;
    }

    .hero h1 {
        font-size: clamp(48px, 6vw, 80px);
        font-weight: 600;
        letter-spacing: -1px;
        margin-bottom: 16px;
    }

    .hero p {
        font-size: 24px;
        color: var(--text-sub);
        max-width: 700px;
        margin: auto;
        line-height: 1.4;
    }

    .container {
        max-width: 980px;
        margin: auto;
        padding: 0 20px 100px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 28px;
    }

    .card {
        background: var(--card-bg);
        border-radius: 20px;
        padding: 50px 30px;
        text-align: center;
        text-decoration: none;
        color: inherit;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
        transform: translateY(-6px);
        box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    }

    .icon {
        margin-bottom: 24px;
    }

    .icon svg {
        width: 64px;
        height: 64px;
        display: block;
        margin: 0 auto;
    }

    .card h3 {
        font-size: 24px;
        font-weight: 500;
        margin-bottom: 10px;
    }

    .card p {
        font-size: 16px;
        color: var(--text-sub);
        line-height: 1.5;
    }

    footer {
        text-align: center;
        padding: 40px 20px;
        font-size: 13px;
        color: var(--text-sub);
    }

    footer a {
        color: #0066cc;
        text-decoration: none;
    }
</style>
</head>

<body>

<section class="hero">
    <h1>工具箱</h1>
    <p>专注实用，简洁高效，随时可用。</p>
</section>

<div class="container">
    <div class="grid">

        <!-- A4 → A3 合并 -->

                          fill="#ffffff" stroke="#d1d1d6" stroke-width="1.5"/>
                    <path d="M8 8h8M8 12h5M8 16h4"
                          stroke="#007aff" stroke-width="1.5" stroke-linecap="round"/>
                    <text x="12" y="22" text-anchor="middle"
                          font-size="6" fill="#007aff">PDF</text>
                </svg>
            </div>
            <h3>A4 → A3 合并工具（PDF版）</h3>
            <p>将多页 A4 PDF 合并为 A3 排版</p>
        </a>

        <!-- 考官编排 -->
        <a href="https://tardis923.github.io/kaoguan/" target="_blank" class="card">

                    <circle cx="12" cy="8" r="4" fill="#007aff"/>

                    <rect x="9" y="14" width="6" height="3" rx="1" fill="#007aff"/>
                </svg>
            </div>
            <h3>考官编排</h3>
            <p>考官编排</p>
        </a>

        <!-- 监考编排 -->

            <div class="icon">

                    <circle cx="12" cy="8" r="4" fill="#5856d6"/>
                    <path d="M4 20c0-4 4-6 8-6s8 2 8 6" fill="#c7c7cc"/>
                    <circle cx="12" cy="12" r="2" fill="#5856d6"/>
                </svg>
            </div>
            <h3>监考编排</h3>
            <p>快速编排监考</p>
        </a>

        <!-- 学科编排 -->
        <a href="https://tardis923.github.io/ntce/" target="_blank" class="card">

                    <rect x="4" y="4" width="16" height="16" rx="2"
                          fill="#ffffff" stroke="#af52de" stroke-width="1.5"/>
                    <path d="M8 8h8M8 12h8M8 16h5"

                    <rect x="4" y="4" width="16" height="16" rx="2"
                          fill="#34c759" stroke="#1d1d1f" stroke-width="1"/>
                    <text x="12" y="14" text-anchor="middle"
                          font-size="8" fill="#ffffff" font-weight="bold">+</text>
                    <text x="12" y="20" text-anchor="middle"
                          font-size="5" fill="#d1f7c4">CALC</text>

 <!-- PDF加页脚 -->

            <div class="icon">
                <svg viewBox="0 0 24 24" fill="none">
  <rect x="4" y="2" width="16" height="20" rx="2" fill="#ffffff" stroke="#d1d1d6" stroke-width="1.5"/>
  <rect x="7" y="15" width="10" height="5" fill="#007aff" rx="1"/>
  <path d="M8 8h8M8 12h6" stroke="#1d1d1f" stroke-width="1.5" stroke-linecap="round"/>
</svg>
            </div>
            <h3>PDF加页脚</h3>

</div>

<footer>
    © 2026 · Designed like Apple · 
</footer>

</body>
</html>
